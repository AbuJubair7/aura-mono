version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_api
    restart: always
    ports:
      - '5001:5001'
    environment:
      - PORT=5001
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=114957
      - DB_NAME=e-commerce
      - DB_SYNCHRONIZE=true
      - JWT_SECRET=super-secret-key-change-in-production
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: ecommerce_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: '114957'
      POSTGRES_DB: e-commerce
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

